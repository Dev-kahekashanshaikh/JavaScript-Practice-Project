<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        *{
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
        }
        section{
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            

        }
        div{
            height: 70px;
            width: 50%;
            /* border: 2px solid black; */
      
           text-align: left;
     
        }
        container{
            font-size: larger;
            text-align: left;
        }
    </style>
</head>
<body>
    <form action="">
    <section>
       
        <div style="text-align: center;">
            <h1>Discount Calculator  by kahekashan</h1>
        </div>
        <div class="row">
            <container class="col-3"> <label for="bill-amt" class="form-label">Enter bill amount </label ></container>
            <container class="col-8">  <input type="text" name="bill-amt" id="bill-amt" class="form-control "></container>

          
          
            
        </div>          
        <div class="row"> 
            <container class="col-3">
            <label for="Discount">Select discount</label></container>
            <container class="col-8"> 
        <select name="Discount" id="Discount" class="form-control ">
            <option value="select">select</option>
            <option value="10">10%</option>
            <option value="15">15%</option>
            <option value="20">20%</option>
            <option value="50">50%</option>
         
            

        </select></container>
        </div>
        <div class="row">
            <container class="col-3">
            <label for="Dic-amt">Discount amount</label></container>
            <container class="col-8"> <input type="text" name="Dic-amt" id="Dic-amt" class="form-control "></container>
        </div>
        <div class="row">
            <container class="col-3">
            <label for="finalPay"> Final Pay:</label></container>
            <container class="col-8">  <input type="text" name="finalPay" id="finalPay" class="form-control "></container>
        </div>
        <div class="row">
            <container class="col-11"> 
            <input type="button" value="Calculate" class="form-control bg-primary" onclick="cal()"></container>
            <container class="col-11">
                <input type="reset" value="Reset" class="form-control bg-success mt-3"></container>
        </div>
        <div class="row">
          
        </div>
   
    </section> </form>

</body>
<script>

  let num =   document.getElementById("bill-amt");
  let discountpercent =   document.getElementById("Discount")
  let  discountamt=   document.getElementById("Dic-amt");
  discountpercent.addEventListener("change",(elem)=>{
 let x = discountpercent.value;
console.log(x);
let prcamt = Number(num.value) * Number(x)/100;
discountamt.value = prcamt;
  })
function cal() {
  let pay = Number(num.value) - Number(discountamt.value) ;
  document.getElementById("finalPay").value = pay ;
}
</script>
</html>
